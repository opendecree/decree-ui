server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy API calls to the decree server.
    # Using a variable forces nginx to resolve at request time (not startup),
    # so the container can start before the upstream is available.
    set $api_upstream "${API_URL}";
    location /v1/ {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
