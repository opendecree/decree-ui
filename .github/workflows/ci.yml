# CI pipeline for the OpenDecree Admin GUI (React + Vite + Tailwind).
#
# Jobs: lint, typecheck, test, build → check (alls-green gate)
# The check job aggregates all results for branch protection.
#
# The first job defines YAML anchors (&checkout, &setup-node-22, &install)
# on its setup steps; subsequent jobs alias them to avoid repetition.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - &checkout
        name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - &setup-node-22
        name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - &install
        name: Install dependencies
        run: npm ci
      - name: Run biome lint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *setup-node-22
      - *install
      - name: Run tsc
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *setup-node-22
      - *install
      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *setup-node-22
      - *install
      - name: Build production bundle
        run: npm run build

  check:
    name: CI check
    if: always()
    needs: [lint, typecheck, test, build]
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
