name: Bug Report
description: Report a bug in the OpenDecree Admin GUI
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: To reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Schema pages
        - Config editor
        - Tenant views
        - Audit / history
        - Layout / navigation
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g., Chrome 126, Firefox 128
    validations:
      required: true
  - type: input
    id: server-version
    attributes:
      label: OpenDecree server version
      placeholder: e.g., v0.5.0
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g., Linux, macOS, Windows
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, console errors, or anything else that helps.
